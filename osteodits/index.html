<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing you...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            margin-top: 0;
            font-size: 1.4rem;
        }
        .status {
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        .current-link {
            font-size: 0.85rem;
            color: #999;
            word-break: break-all;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading UI -->
        <div id="loading-ui">
            <div class="spinner"></div>
            <h2>Finding the best connection...</h2>
            <div class="status" id="status-text">Checking available servers</div>
            <div class="current-link" id="current-link"></div>
        </div>
    </div>

    <script>
        // 1. ADD YOUR PRIMARY LINKS HERE
        const targetLinks = [
            "https://api.your-server-1.com/health", 
            "https://osteo.pve-2.jaysgrid.online/"
        ];

        // 2. ADD YOUR FALLBACK LINK HERE
        const fallbackLink = "https://osteo.pve-2.jaysgrid.online/";

        const statusText = document.getElementById('status-text');
        const currentLinkText = document.getElementById('current-link');

        // 3. Direct Link Checker (Assuming you handle CORS headers on destination)
        async function checkLink(url) {
            try {
                // Using HEAD to make the check lighter, but standard GET works too
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok; 
            } catch (error) {
                console.warn(`Failed to connect to ${url} (Offline or CORS blocked)`);
                return false;
            }
        }

        // 4. Main Routing Logic
        async function routeToActiveLink() {
            for (let i = 0; i < targetLinks.length; i++) {
                const url = targetLinks[i];
                currentLinkText.innerText = `Pinging: ${url}`;

                const isActive = await checkLink(url);

                if (isActive) {
                    // Success! Update UI and redirect.
                    statusText.innerText = "Active server found! Redirecting...";
                    statusText.style.color = "#2ecc71";
                    currentLinkText.innerText = url;
                    
                    setTimeout(() => {
                        window.location.href = url;
                    }, 600);
                    
                    return; // Stop the loop
                }
            }

            // 5. Fallback trigger: If the loop finishes and nothing worked
            statusText.innerText = "Servers unreachable. Loading fallback...";
            statusText.style.color = "#e67e22"; // Orange warning color
            currentLinkText.innerText = fallbackLink;
            
            setTimeout(() => {
                window.location.href = fallbackLink;
            }, 800);
        }

        // Start checking as soon as the page loads
        window.onload = routeToActiveLink;
    </script>
</body>
</html>
